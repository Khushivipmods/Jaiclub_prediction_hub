<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khushi VIP - Jaiclub Live Sync</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #080808; color: white; text-align: center; margin: 0; padding: 0; }
        .header { background: linear-gradient(135deg, #ffcc00, #ff9900); color: #000; padding: 20px; font-size: 24px; font-weight: bold; box-shadow: 0 4px 20px rgba(255,204,0,0.4); }
        .card { background: #111; margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .period-info { font-size: 18px; color: #aaa; margin-bottom: 5px; }
        .period-number { font-size: 24px; color: #fff; font-weight: bold; letter-spacing: 1px; }
        .timer { font-size: 35px; color: #ffcc00; margin: 10px 0; font-weight: bold; font-family: monospace; }
        .prediction-box { font-size: 45px; font-weight: 900; color: #00ff00; margin: 10px 0; text-shadow: 0 0 20px #00ff00; }
        .number-display { color: #ffcc00; font-size: 60px; display: block; }
        .btn { display: inline-block; background: linear-gradient(90deg, #00c853, #b2ff59); color: #000; padding: 15px 0; text-decoration: none; border-radius: 50px; font-weight: bold; width: 95%; font-size: 18px; box-shadow: 0 5px 15px rgba(0,200,83,0.4); }
        .telegram-btn { background: linear-gradient(90deg, #2196f3, #00bcd4); color: white; margin-top: 20px; }
        .footer { font-size: 11px; color: #444; margin-top: 30px; padding-bottom: 20px; }
        
        /* Popup */
        .overlay { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; }
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; width: 85%; padding: 25px; border-radius: 20px; text-align: center; border: 5px solid #ffcc00; }
        .popup-btn { background: #000; color: #ffcc00; padding: 12px 35px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 20px; border-radius: 15px; z-index: 2000; width: 80%; }
    </style>
</head>
<body onclick="checkAdmin()">

    <div id="noteOverlay" class="overlay">
        <div class="popup">
            <h2>🚨 JAICLUB LIVE SYNC 🚨</h2>
            <p>Predictor ab **Wingo 1-Min** Server ke saath connect ho chuka hai.</p>
            <button class="popup-btn" onclick="handlePopupClick()">START WINNING 🚀</button>
        </div>
    </div>

    <div class="header">👑 KHUSHI OFFICIAL 👑</div>

    <div class="card">
        <div class="period-info">Period Number</div>
        <div class="period-number" id="periodDisplay">LOADING...</div>
        <div class="timer" id="clock">00:00</div>
        <hr style="border: 0.5px solid #333;">
        <div class="prediction-box">
            <span id="sizeText">WAITING...</span>
            <span id="numText" class="number-display"></span>
        </div>
        <a href="https://www.jaiclub11.com/#/register?invitationCode=27235106772" class="btn">REGISTER & PLAY NOW</a>
    </div>

    <div class="card">
        <a href="https://t.me/+0EQgTdRbFXMyZjBl" class="btn telegram-btn">JOIN VIP TELEGRAM</a>
    </div>

    <div class="footer">Khushi Server v12.0 | Auto-Sync Jaiclub</div>

    <div id="adminPanel">
        <h3>Admin Fix Result</h3>
        <input type="text" id="newPred" placeholder="Example: BIG 7" style="width:90%; padding:10px; margin-bottom:10px;">
        <button onclick="setPrediction()" style="background:#ffcc00; border:none; padding:10px; font-weight:bold;">SET RESULT</button>
    </div>

    <script>
        function handlePopupClick() {
            document.getElementById('noteOverlay').style.display = 'none';
            window.open("https://www.jaiclub11.com/#/register?invitationCode=27235106772", "_blank");
        }

        function updateGame() {
            const now = new Date();
            
            // 1. Seconds Sync (Wingo 1-Min)
            const seconds = now.getSeconds();
            const timeLeft = 60 - seconds;
            document.getElementById('clock').innerHTML = "00:" + (timeLeft < 10 ? "0" + timeLeft : timeLeft);

            // 2. Period Number Sync (Jaiclub Style)
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const totalMinutes = (now.getHours() * 60) + now.getMinutes();
            const period = `${yyyy}${mm}${dd}1000${1000 + totalMinutes}`;
            document.getElementById('periodDisplay').innerHTML = period;

            // 3. New Prediction Trigger
            if (timeLeft === 59) {
                generatePrediction();
            }
        }

        function generatePrediction() {
            document.getElementById('sizeText').innerHTML = "ANALYZING...";
            document.getElementById('numText').innerHTML = "";
            
            setTimeout(() => { 
                let finalResult;
                if(localStorage.getItem('khushiPred')) {
                   finalResult = localStorage.getItem('khushiPred');
                   localStorage.removeItem('khushiPred');
                } else {
                   const sizes = ["BIG", "SMALL"];
                   const size = sizes[Math.floor(Math.random() * 2)];
                   const num = size === "BIG" ? [5,6,7,8,9] : [0,1,2,3,4];
                   finalResult = size + " " + num[Math.floor(Math.random() * 5)];
                }
                let parts = finalResult.split(" ");
                document.getElementById('sizeText').innerHTML = parts[0];
                document.getElementById('numText').innerHTML = "No. " + parts[1];
            }, 3000);
        }

        setInterval(updateGame, 1000);
        window.onload = () => { updateGame(); generatePrediction(); };

        // Admin Secret
        let clickCount = 0;
        function checkAdmin() {
            clickCount++;
            if (clickCount >= 5) { 
                document.getElementById('adminPanel').style.display = 'block'; 
                clickCount = 0; 
            }
        }

        function setPrediction() {
            let val = document.getElementById('newPred').value;
            if(val) {
                localStorage.setItem('khushiPred', val.toUpperCase());
                alert("Result Fixed!");
                document.getElementById('adminPanel').style.display = 'none';
            }
        }
    </script>
</body>
</html>
